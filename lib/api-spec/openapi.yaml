    SellerListingVariantCreateInput:
      type: object
      description: >-
        Shape of one entry in CreateSellerListingBody.variants (no id --
        every variant in a create request is new).
      properties:
        form:
          type: ["string", "null"]
        rootType:
          type: ["string", "null"]
        potSize:
          type: ["string", "null"]
        age:
          type: ["string", "null"]
        height:
