    SellerListingVariantUpdateInput:
      type: object
      description: >-
        Shape of one entry in UpdateSellerListingBody.variants. An entry
        WITH id updates that existing variant (partial update -- only
        fields present in the object are changed). An entry with NO id
        creates a new variant under the listing.
      properties:
        id:
          type: integer
        form:
          type: ["string", "null"]
        rootType:
          type: ["string", "null"]
        potSize:
          type: ["string", "null"]
        age:
          type: ["string", "null"]
        height:
          type: ["string", "null"]
        condition:
          type: ["string", "null"]
        price:
          type: number
        discountPrice:
          type: ["number", "null"]
        stock:
          type: integer
        deliveryCharge:
          type: number
        isPreOrder:
          type: boolean

