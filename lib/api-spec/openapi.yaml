    CreateOrderBody:
      type: object
      description: >-
        A cart spanning multiple sellers splits into one order per seller
        group (plan doc §2, §7). paymentMethod is the fallback/default used
        for any group not present in sellerPaymentMethods; a single-seller
        or all-admin-direct cart can just send paymentMethod and omit
        sellerPaymentMethods entirely.
      properties:
        paymentMethod:
          type: string
          description: Fallback payment method for any seller group not present in sellerPaymentMethods.
        sellerPaymentMethods:
          type: object
          additionalProperties:
            type: string
          description: >-
            Per-seller-group payment method override, keyed by sellerId as
            a string ("null" for the admin-direct group). Each seller only
            accepts the payment methods enabled on their listings (plan doc
            §7) -- the buyer picks per group at checkout, not once
            globally.
        transactionId:
          type: ["string", "null"]
        senderNumber:
          type: ["string", "null"]
          description: >-
            Fallback bKash sending number for any seller group not present
            in sellerSenderNumbers. Required when the resolved payment
            method for a group is "bkash" and that group has no override
            in sellerSenderNumbers.
        sellerSenderNumbers:
          type: object
          additionalProperties:
            type: ["string", "null"]
          description: >-
            Per-seller-group bKash sending number override, keyed by
            sellerId as a string ("null" for the admin-direct group) --
            same key convention as sellerPaymentMethods. Added in Part 5:
            previously a single top-level senderNumber was reused across
            every seller group resolving to "bkash", which doesn't hold up
            once a cart has multiple sellers with separate bKash merchant
            accounts (PHASE3_HANDOFF.md flagged this as a known gap).
        shippingAddress:
          $ref: "#/components/schemas/AddressBody"
        couponCode:
          type: ["string", "null"]
        loyaltyPointsToRedeem:
          type: integer
        giftWrap:
          type: boolean
        giftMessage:
          type: ["string", "null"]
      required:
