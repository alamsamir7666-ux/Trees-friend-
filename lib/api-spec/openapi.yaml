        - apiKeyMasked
        - apiSecretMasked
        - isVerified
        - createdAt

    CreateSellerCourierConfigBody:
      type: object
      description: >-
        For provider "pathao", apiSecret must be packed as
        "clientSecret|username|password" (Pathao's OAuth needs 3 fields
        beyond the 2-field apiKey/apiSecret shape this table provides --
        see lib/courierAdapters/pathao.ts). storeId is required for pathao,
        unused for steadfast.
      properties:
        provider:
          type: string
          enum: [pathao, steadfast]
        apiKey:
          type: string
        apiSecret:
          type: string
        storeId:
          type: string
      required:
        - provider
        - apiKey
        - apiSecret

    SellerPaymentConfig:
      type: object
      description: >-
        Masked seller bKash merchant credentials (plan doc §4, §7 — Part 5).
        Never contains decrypted merchantAppKey/merchantAppSecret/
        merchantUsername/merchantPassword -- only a last-4-style mask, per
        the schema's security note. isVerified is never set true by the
        create/replace route itself (no live-credential check exists) --
        it stays false until some future verification step sets it, and
        routes/sellerListings.ts + routes/orders.ts both gate
        "advance"/"both"/"bkash" on isVerified specifically, not just row
        existence.
      properties:
        id:
          type: integer
        sellerId:
          type: integer
        provider:
          type: string
          enum: [bkash]
        merchantAppKeyMasked:
          type: string
        merchantAppSecretMasked:
          type: string
        merchantUsernameMasked:
          type: string
        merchantPasswordMasked:
          type: string
        isVerified:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - sellerId
        - provider
        - merchantAppKeyMasked
        - merchantAppSecretMasked
        - merchantUsernameMasked
        - merchantPasswordMasked
        - isVerified
        - createdAt
        - updatedAt

    CreateSellerPaymentConfigBody:
      type: object
      description: >-
        provider defaults to "bkash" (the only provider this schema/plan
        support today) if omitted. All four merchant credential fields are
        required -- bKash's merchant API needs all of them together, there
        is no partial-credential state.
      properties:
        provider:
          type: string
          enum: [bkash]
        merchantAppKey:
          type: string
        merchantAppSecret:
          type: string
        merchantUsername:
          type: string
        merchantPassword:
          type: string
      required:
        - merchantAppKey
        - merchantAppSecret
        - merchantUsername
        - merchantPassword

