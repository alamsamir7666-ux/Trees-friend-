          type: string
          enum: [variant, seller_listing]
        productId:
          type: integer
        variantId:
          type: ["integer", "null"]
        sellerListingId:
          type: ["integer", "null"]
        sellerId:
          type: ["integer", "null"]
        quantity:
          type: integer
        variant:
          oneOf:
            - $ref: "#/components/schemas/ProductVariant"
            - type: "null"
        seller:
          oneOf:
            - $ref: "#/components/schemas/CartItemSeller"
            - type: "null"
        listing:
          $ref: "#/components/schemas/CartItemListing"
        product:
          $ref: "#/components/schemas/CartItemProduct"
