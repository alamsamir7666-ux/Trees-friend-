        - deliveryTotal
        - total

    AddToCartBody:
      type: object
      description: >-
        Specify exactly one of variantId (admin-direct product variant) or
        sellerListingVariantId (marketplace seller listing variant), never
        both, never neither -- confirmed against cart.ts's POST /cart/items
        handler, which rejects the request with 400 if hasVariant ===
        hasListingVariant. sellerListingId is still accepted in the request
        body for backward compat with older clients, but is IGNORED for
        line-creation purposes -- the route derives sellerListingId itself
        from sellerListingVariantId's own FK rather than trusting a
        client-sent value.
      properties:
        productId:
          type: integer
        variantId:
          type: integer
          nullable: true
        sellerListingId:
          type: integer
          nullable: true
          description: Deprecated/ignored -- see description above. Prefer sellerListingVariantId.
        sellerListingVariantId:
          type: integer
          nullable: true
        quantity:
          type: integer
      required:
        - productId
        - quantity

