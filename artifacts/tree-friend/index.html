    <meta charset="UTF-8" />

    <!-- Open Graph -->

    <meta property="og:site_name" content="Tree Friend" />
    <meta property="og:title" content="Tree Friend – Trees & Plants for Every Home" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Shop fruit trees, indoor plants, and saplings in Bangladesh." />
    <meta name="twitter:image" content="/opengraph.jpg" />


    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tree Friend" />

    <!-- Canonical -->
    <link rel="canonical" href="https://treefriend.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.webp" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://treefriend-api.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://clerk.treefriend.com" />

    <!-- Preload LCP hero image so browser fetches it immediately -->
    <link rel="preload" as="image" href="https://res.cloudinary.com/dcfbtdp6r/image/upload/v1783747272/IMG_20260711_111454-removebg-preview_11zon_wsnwgd.png" fetchpriority="high" />

    <!-- Fonts: DM Sans for body + DM Serif Display for headings (matches index.css) -->

    <!-- Fonts: Jost + Lora for the new footer design -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&family=Lora:wght@600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&family=Lora:wght@600;700&family=Outfit:wght@400;500;600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&family=Lora:wght@600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" /></noscript>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Tree Friend",
      "url": "https://treefriend.com",
      "logo": "https://res.cloudinary.com/dcfbtdp6r/image/upload/v1783743859/IMG_20260710_151144-removebg-preview_11zon_ck95ax.png",
      "description": "Trees, plants, and saplings in Bangladesh",
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tree Friend",
      "url": "https://treefriend.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://treefriend.com/products?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
